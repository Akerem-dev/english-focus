name: Apply critical data integrity phase

on:
  push:
    branches: [fix/critical-data-integrity]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/critical-data-integrity
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Apply phase one changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          Path("packages/domain/src/data/LocalDataReset.ts").write_text('''import type { BackupDescriptor } from "../backup";

          export const LOCAL_DATA_CATEGORIES = [
            "study-metadata",
            "user-vocabulary",
            "overrides",
            "settings",
            "activity",
            "backups"
          ] as const;

          export type LocalDataCategory = (typeof LOCAL_DATA_CATEGORIES)[number];

          export interface LocalDataSnapshot {
            readonly studyMetadataRecords: number;
            readonly userVocabularyEntries: number;
            readonly overrideVocabularyEntries: number;
            readonly settingsRecords: number;
            readonly activityRecords: number;
            readonly backupFiles: number;
          }

          export interface ResetLocalDataInput {
            readonly categories: readonly LocalDataCategory[];
            readonly createSafetyBackup: boolean;
            readonly requestedAt: string;
          }

          export interface BackupDeletionResult {
            readonly requested: boolean;
            readonly deletedFiles: number;
            readonly failedFiles: number;
          }

          export interface ResetLocalDataResult {
            readonly deleted: LocalDataSnapshot;
            readonly safetyBackup?: BackupDescriptor | undefined;
            readonly backupDeletion: BackupDeletionResult;
          }
          ''', encoding="utf-8")

          Path("packages/schemas/src/data/local-data.schema.ts").write_text('''import { z } from "zod";

          import { backupDescriptorSchema } from "../backup";

          export const localDataCategorySchema = z.enum([
            "study-metadata",
            "user-vocabulary",
            "overrides",
            "settings",
            "activity",
            "backups"
          ]);

          export const localDataSnapshotSchema = z
            .object({
              studyMetadataRecords: z.number().int().nonnegative(),
              userVocabularyEntries: z.number().int().nonnegative(),
              overrideVocabularyEntries: z.number().int().nonnegative(),
              settingsRecords: z.number().int().nonnegative(),
              activityRecords: z.number().int().nonnegative(),
              backupFiles: z.number().int().nonnegative()
            })
            .strict();

          const optionalSafetyBackupSchema = z
            .union([backupDescriptorSchema, z.null()])
            .optional()
            .transform((value) => value ?? undefined);

          const backupDeletionResultSchema = z
            .object({
              requested: z.boolean(),
              deletedFiles: z.number().int().nonnegative(),
              failedFiles: z.number().int().nonnegative()
            })
            .strict();

          const noBackupDeletion = Object.freeze({
            requested: false,
            deletedFiles: 0,
            failedFiles: 0
          });

          export const resetLocalDataResultSchema = z
            .object({
              deleted: localDataSnapshotSchema,
              safetyBackup: optionalSafetyBackupSchema,
              backupDeletion: backupDeletionResultSchema.optional().default(noBackupDeletion)
            })
            .strict();
          ''', encoding="utf-8")

          Path("packages/schemas/tests/local-data.schema.test.ts").write_text('''import { describe, expect, it } from "vitest";

          import { localDataSnapshotSchema, resetLocalDataResultSchema } from "../src";

          const emptySnapshot = {
            studyMetadataRecords: 0,
            userVocabularyEntries: 0,
            overrideVocabularyEntries: 0,
            settingsRecords: 0,
            activityRecords: 0,
            backupFiles: 0
          };

          describe("local data schemas", () => {
            it("accepts a non-negative local data snapshot", () => {
              expect(localDataSnapshotSchema.parse(emptySnapshot)).toEqual(emptySnapshot);
            });

            it("treats a desktop null safety backup as no recovery copy", () => {
              expect(
                resetLocalDataResultSchema.parse({
                  deleted: emptySnapshot,
                  safetyBackup: null
                })
              ).toEqual({
                deleted: emptySnapshot,
                safetyBackup: undefined,
                backupDeletion: {
                  requested: false,
                  deletedFiles: 0,
                  failedFiles: 0
                }
              });
            });

            it("accepts a partial backup deletion result without discarding committed counts", () => {
              expect(
                resetLocalDataResultSchema.parse({
                  deleted: { ...emptySnapshot, settingsRecords: 1, backupFiles: 2 },
                  safetyBackup: null,
                  backupDeletion: {
                    requested: true,
                    deletedFiles: 2,
                    failedFiles: 1
                  }
                })
              ).toMatchObject({
                deleted: { settingsRecords: 1, backupFiles: 2 },
                backupDeletion: { requested: true, deletedFiles: 2, failedFiles: 1 }
              });
            });

            it("rejects impossible negative deletion counts", () => {
              expect(() =>
                resetLocalDataResultSchema.parse({
                  deleted: { ...emptySnapshot, activityRecords: -1 }
                })
              ).toThrow();
            });
          });
          ''', encoding="utf-8")

          Path("apps/desktop/src/modules/settings/application/ManageLocalData.ts").write_text('''import type {
            LocalDataCategory,
            LocalDataSnapshot,
            ResetLocalDataResult
          } from "@platform/domain";

          export const FULL_LOCAL_RESET_CATEGORIES: readonly LocalDataCategory[] = Object.freeze([
            "study-metadata",
            "user-vocabulary",
            "overrides",
            "settings",
            "activity"
          ]);

          export const RESET_APPLICATION_CONFIRMATION = "RESET ENGLISH FOCUS";

          export interface LocalDataResetPresentation {
            readonly resultMessage: string;
            readonly toastMessage: string;
            readonly toastTone: "success" | "warning";
            readonly refreshIncomplete: boolean;
          }

          export function isFullResetConfirmation(value: string): boolean {
            return value.trim() === RESET_APPLICATION_CONFIRMATION;
          }

          export function canCreateSafetyBackup(categories: readonly LocalDataCategory[]): boolean {
            return (
              !categories.includes("backups") &&
              categories.some((category) =>
                ["study-metadata", "user-vocabulary", "overrides", "settings"].includes(category)
              )
            );
          }

          export function selectedLocalDataCount(
            snapshot: LocalDataSnapshot,
            categories: readonly LocalDataCategory[]
          ): number {
            return categories.reduce((total, category) => {
              switch (category) {
                case "study-metadata":
                  return total + snapshot.studyMetadataRecords;
                case "user-vocabulary":
                  return total + snapshot.userVocabularyEntries;
                case "overrides":
                  return total + snapshot.overrideVocabularyEntries;
                case "settings":
                  return total + snapshot.settingsRecords;
                case "activity":
                  return total + snapshot.activityRecords;
                case "backups":
                  return total + snapshot.backupFiles;
              }
            }, 0);
          }

          export function deletedLocalDataCount(result: ResetLocalDataResult): number {
            const deleted = result.deleted;
            return (
              deleted.studyMetadataRecords +
              deleted.userVocabularyEntries +
              deleted.overrideVocabularyEntries +
              deleted.settingsRecords +
              deleted.activityRecords +
              deleted.backupFiles
            );
          }

          export function presentLocalDataResetResult(
            result: ResetLocalDataResult,
            refreshIncomplete: boolean
          ): LocalDataResetPresentation {
            const deletedCount = deletedLocalDataCount(result);
            const deletedLabel = `${deletedCount} ${deletedCount === 1 ? "item" : "items"} removed.`;
            const recoveryLabel =
              result.safetyBackup === undefined
                ? "No recovery copy was created."
                : "A recovery copy was created first.";
            const backupFailureCount = result.backupDeletion.failedFiles;
            const backupWarning =
              backupFailureCount === 0
                ? undefined
                : `${backupFailureCount} saved ${backupFailureCount === 1 ? "backup" : "backups"} could not be removed.`;
            const refreshWarning = refreshIncomplete
              ? "The removal finished, but some on-screen totals could not refresh yet."
              : undefined;
            const warnings = [backupWarning, refreshWarning].filter(
              (message): message is string => message !== undefined
            );

            return Object.freeze({
              resultMessage: [deletedLabel, recoveryLabel, ...warnings].join(" "),
              toastMessage:
                warnings.length === 0
                  ? `${deletedLabel} ${recoveryLabel}`
                  : `${deletedLabel} ${warnings.join(" ")}`,
              toastTone: warnings.length === 0 ? "success" : "warning",
              refreshIncomplete
            });
          }
          ''', encoding="utf-8")

          index_path = Path("apps/desktop/src/modules/settings/application/index.ts")
          index_text = index_path.read_text(encoding="utf-8")
          index_text = index_text.replace(
              '''  canCreateSafetyBackup,
            isFullResetConfirmation,
            selectedLocalDataCount
          ''',
              '''  canCreateSafetyBackup,
            deletedLocalDataCount,
            isFullResetConfirmation,
            presentLocalDataResetResult,
            selectedLocalDataCount,
            type LocalDataResetPresentation
          '''
          )
          index_path.write_text(index_text, encoding="utf-8")

          Path("apps/desktop/tests/unit/settings/local-data-management.test.ts").write_text('''import { describe, expect, it } from "vitest";

          import {
            FULL_LOCAL_RESET_CATEGORIES,
            RESET_APPLICATION_CONFIRMATION,
            canCreateSafetyBackup,
            isFullResetConfirmation,
            presentLocalDataResetResult,
            selectedLocalDataCount
          } from "../../../src/modules/settings/application";

          const snapshot = {
            studyMetadataRecords: 4,
            userVocabularyEntries: 3,
            overrideVocabularyEntries: 2,
            settingsRecords: 1,
            activityRecords: 9,
            backupFiles: 5
          };

          const resetResult = {
            deleted: {
              studyMetadataRecords: 0,
              userVocabularyEntries: 2,
              overrideVocabularyEntries: 0,
              settingsRecords: 1,
              activityRecords: 0,
              backupFiles: 2
            },
            safetyBackup: undefined,
            backupDeletion: {
              requested: true,
              deletedFiles: 2,
              failedFiles: 0
            }
          };

          describe("local data management safeguards", () => {
            it("keeps saved backups outside a normal full application reset", () => {
              expect(FULL_LOCAL_RESET_CATEGORIES).not.toContain("backups");
              expect(FULL_LOCAL_RESET_CATEGORIES).toEqual([
                "study-metadata",
                "user-vocabulary",
                "overrides",
                "settings",
                "activity"
              ]);
            });

            it("uses typed confirmation only for the full reset flow", () => {
              expect(RESET_APPLICATION_CONFIRMATION).toBe("RESET ENGLISH FOCUS");
              expect(isFullResetConfirmation("RESET ENGLISH FOCUS")).toBe(true);
              expect(isFullResetConfirmation(" RESET ENGLISH FOCUS ")).toBe(true);
              expect(isFullResetConfirmation("DELETE SELECTED DATA")).toBe(false);
            });

            it("offers recovery copies only when saved backups are preserved", () => {
              expect(canCreateSafetyBackup(["settings", "study-metadata"])).toBe(true);
              expect(canCreateSafetyBackup(["activity"])).toBe(false);
              expect(canCreateSafetyBackup(["settings", "backups"])).toBe(false);
            });

            it("totals the selected data groups", () => {
              expect(selectedLocalDataCount(snapshot, ["user-vocabulary", "activity"])).toBe(12);
            });

            it("reports committed deletion separately from a failed backup cleanup", () => {
              const presentation = presentLocalDataResetResult(
                {
                  ...resetResult,
                  backupDeletion: { requested: true, deletedFiles: 2, failedFiles: 1 }
                },
                false
              );

              expect(presentation.toastTone).toBe("warning");
              expect(presentation.resultMessage).toContain("5 items removed");
              expect(presentation.resultMessage).toContain("1 saved backup could not be removed");
              expect(presentation.resultMessage).not.toContain("Nothing was removed");
            });

            it("reports refresh failures without changing a successful removal into an error", () => {
              const presentation = presentLocalDataResetResult(resetResult, true);

              expect(presentation.toastTone).toBe("warning");
              expect(presentation.refreshIncomplete).toBe(true);
              expect(presentation.resultMessage).toContain("The removal finished");
            });
          });
          ''', encoding="utf-8")

          component_path = Path("apps/desktop/src/modules/settings/components/LocalDataControlsSection.tsx")
          component = component_path.read_text(encoding="utf-8")
          component = component.replace(
              'type LocalDataErrorState = "summary" | "action" | undefined;',
              'type LocalDataErrorState = "summary" | "action" | "refresh" | undefined;'
          )
          component = component.replace(
              '''  canCreateSafetyBackup,
            isFullResetConfirmation,
            selectedLocalDataCount
          ''',
              '''  canCreateSafetyBackup,
            isFullResetConfirmation,
            presentLocalDataResetResult,
            selectedLocalDataCount
          '''
          )
          summary_start = component.index("function deletedSummary")
          component_start = component.index("\n\nexport function LocalDataControlsSection", summary_start)
          component = component[:summary_start] + component[component_start + 2:]
          component = component.replace(
              "  const [lastResult, setLastResult] = useState<ResetLocalDataResult | undefined>();",
              "  const [lastResult, setLastResult] = useState<ResetLocalDataResult | undefined>();\n  const [lastResultMessage, setLastResultMessage] = useState<string | undefined>();"
          )
          component = component.replace(
              '''    setLastResult(undefined);
            }, []);''',
              '''    setLastResult(undefined);
            setLastResultMessage(undefined);
          }, []);'''
          )
          old_reset = '''  async function performReset(categories: readonly LocalDataCategory[], fullReset: boolean) {
            setStatus("resetting");
            setErrorState(undefined);
            setLastResult(undefined);

            try {
              const safetyAvailable = canCreateSafetyBackup(categories);
              const result = await repository.resetLocalData({
                categories,
                createSafetyBackup: safetyAvailable && createSafetyBackup,
                requestedAt: new Date().toISOString()
              });

              await Promise.all([
                refreshVocabulary(),
                refreshMetadata(),
                refreshSettings(),
                refreshActivity(),
                refreshBackups()
              ]);

              if (!categories.includes("activity")) {
                await recordActivity({
                  kind: "local-data-reset",
                  scope: "settings",
                  label: fullReset ? "English Focus reset" : "Selected data removed"
                }).catch(() => undefined);
              }

              const nextSnapshot = await repository.getSnapshot();
              setSnapshot(nextSnapshot);
              setLastResult(result);
              setStatus("ready");
              showToast({
                title: fullReset ? "English Focus was reset" : "Selected data was removed",
                message: `${deletedSummary(result)} removed${
                  result.safetyBackup === undefined ? "." : "; a recovery copy was created first."
                }`,
                tone: "success",
                dedupeKey: fullReset ? "full-local-reset-success" : "selected-local-data-reset-success"
              });
            } catch {
              setErrorState("action");
              setStatus("error");
              showToast({
                title: fullReset ? "English Focus was not reset" : "Selected data was not removed",
                message: "Nothing was removed. Refresh the summary and try again.",
                tone: "error",
                dedupeKey: fullReset ? "full-local-reset-error" : "selected-local-data-reset-error"
              });
            }
          }

          const resultMessage =
            lastResult === undefined
              ? undefined
              : `${deletedSummary(lastResult)} removed. ${
                  lastResult.safetyBackup === undefined
                    ? "No recovery copy was created."
                    : "A recovery copy was created first."
                }`;
          '''
          new_reset = '''  async function performReset(categories: readonly LocalDataCategory[], fullReset: boolean) {
            setStatus("resetting");
            setErrorState(undefined);
            setLastResult(undefined);
            setLastResultMessage(undefined);

            let result: ResetLocalDataResult;

            try {
              const safetyAvailable = canCreateSafetyBackup(categories);
              result = await repository.resetLocalData({
                categories,
                createSafetyBackup: safetyAvailable && createSafetyBackup,
                requestedAt: new Date().toISOString()
              });
            } catch {
              setErrorState("action");
              setStatus("error");
              showToast({
                title: fullReset ? "English Focus was not reset" : "Selected data was not removed",
                message: "Nothing was removed. Refresh the summary and try again.",
                tone: "error",
                dedupeKey: fullReset ? "full-local-reset-error" : "selected-local-data-reset-error"
              });
              return;
            }

            setLastResult(result);

            if (!categories.includes("activity")) {
              await recordActivity({
                kind: "local-data-reset",
                scope: "settings",
                label: fullReset ? "English Focus reset" : "Selected data removed"
              }).catch(() => undefined);
            }

            const refreshResults = await Promise.allSettled([
              refreshVocabulary(),
              refreshMetadata(),
              refreshSettings(),
              refreshActivity(),
              refreshBackups()
            ]);
            let refreshIncomplete = refreshResults.some(
              (refreshResult) => refreshResult.status === "rejected"
            );

            try {
              const nextSnapshot = await repository.getSnapshot();
              setSnapshot(nextSnapshot);
            } catch {
              refreshIncomplete = true;
            }

            const presentation = presentLocalDataResetResult(result, refreshIncomplete);
            setLastResultMessage(presentation.resultMessage);
            setErrorState(presentation.refreshIncomplete ? "refresh" : undefined);
            setStatus(presentation.refreshIncomplete ? "error" : "ready");
            showToast({
              title:
                presentation.toastTone === "warning"
                  ? fullReset
                    ? "English Focus was reset with a warning"
                    : "Selected data was removed with a warning"
                  : fullReset
                    ? "English Focus was reset"
                    : "Selected data was removed",
              message: presentation.toastMessage,
              tone: presentation.toastTone,
              dedupeKey: fullReset ? "full-local-reset-success" : "selected-local-data-reset-success"
            });
          }
          '''
          if old_reset not in component:
              raise SystemExit("LocalDataControlsSection reset block changed unexpectedly")
          component = component.replace(old_reset, new_reset)
          component = component.replace(
              '''              {errorState === "summary"
                        ? "We could not refresh this page."
                        : "That change was not completed."}''',
              '''              {errorState === "summary"
                        ? "We could not refresh this page."
                        : errorState === "refresh"
                          ? "The removal finished, but this page needs a refresh."
                          : "That change was not completed."}'''
          )
          component = component.replace(
              '''              {errorState === "summary"
                        ? "Your words, personal details, settings, and backups are still available."
                        : "Nothing was removed. Your saved information is unchanged."}''',
              '''              {errorState === "summary"
                        ? "Your words, personal details, settings, and backups are still available."
                        : errorState === "refresh"
                          ? "The completed removal was not undone. Some totals may still be out of date."
                          : "Nothing was removed. Your saved information is unchanged."}'''
          )
          component = component.replace("resultMessage={resultMessage}", "resultMessage={lastResultMessage}")
          component_path.write_text(component, encoding="utf-8")

          backup_path = Path("apps/desktop/src-tauri/src/commands/backup.rs")
          backup = backup_path.read_text(encoding="utf-8")
          backup = backup.replace(
              '''#[derive(Debug, Serialize)]
          #[serde(rename_all = "camelCase")]
          pub struct BackupRestoreResult {
              restored_at: String,
              restored: BackupCounts,
              source_backup: BackupDescriptor,
              safety_backup: BackupDescriptor,
          }
          ''',
              '''#[derive(Debug, Serialize)]
          #[serde(rename_all = "camelCase")]
          pub struct BackupRestoreResult {
              restored_at: String,
              restored: BackupCounts,
              source_backup: BackupDescriptor,
              safety_backup: BackupDescriptor,
          }

          pub(crate) struct BackupDeletionPlan {
              paths: Vec<PathBuf>,
          }

          #[derive(Debug, Clone, Copy, Default, PartialEq, Eq)]
          pub(crate) struct BackupDeletionOutcome {
              pub(crate) deleted_files: usize,
              pub(crate) failed_files: usize,
          }
          '''
          )
          old_delete = '''pub(crate) fn delete_all_backups(app: &AppHandle) -> Result<usize, String> {
              let directory = backup_directory(app)?;
              let descriptors = list_descriptors(&directory)?;
              let mut deleted = 0;

              for descriptor in descriptors {
                  let path = directory.join(descriptor.file_name);
                  fs::remove_file(path)
                      .map_err(|error| format!("A retained backup could not be deleted: {error}"))?;
                  deleted += 1;
              }

              Ok(deleted)
          }
          '''
          new_delete = '''pub(crate) fn plan_delete_all_backups(app: &AppHandle) -> Result<BackupDeletionPlan, String> {
              let directory = backup_directory(app)?;
              let paths = list_descriptors(&directory)?
                  .into_iter()
                  .map(|descriptor| directory.join(descriptor.file_name))
                  .collect();
              Ok(BackupDeletionPlan { paths })
          }

          pub(crate) fn execute_backup_deletion(plan: BackupDeletionPlan) -> BackupDeletionOutcome {
              let mut outcome = BackupDeletionOutcome::default();

              for path in plan.paths {
                  match fs::remove_file(path) {
                      Ok(()) => outcome.deleted_files += 1,
                      Err(_) => outcome.failed_files += 1,
                  }
              }

              outcome
          }
          '''
          if old_delete not in backup:
              raise SystemExit("backup deletion block changed unexpectedly")
          backup = backup.replace(old_delete, new_delete)
          backup = backup.replace(
              '''#[cfg(test)]
          mod tests {
              use super::checksum_for;
          ''',
              '''#[cfg(test)]
          mod tests {
              use std::{
                  fs,
                  time::{SystemTime, UNIX_EPOCH},
              };

              use super::{
                  checksum_for, execute_backup_deletion, BackupDeletionOutcome, BackupDeletionPlan,
              };
          '''
          )
          backup = backup.replace(
              '''    #[test]
              fn rejects_unknown_checksum_algorithms() {
                  assert!(checksum_for("md5", b"abc").is_none());
              }
          }
          ''',
              '''    #[test]
              fn rejects_unknown_checksum_algorithms() {
                  assert!(checksum_for("md5", b"abc").is_none());
              }

              #[test]
              fn reports_partial_backup_deletion_without_discarding_successes() {
                  let unique = SystemTime::now()
                      .duration_since(UNIX_EPOCH)
                      .expect("system clock must be available")
                      .as_nanos();
                  let directory = std::env::temp_dir().join(format!("english-focus-delete-{unique}"));
                  fs::create_dir_all(&directory).expect("temporary backup directory must be created");
                  let existing = directory.join("existing.json");
                  let missing = directory.join("missing.json");
                  fs::write(&existing, b"backup").expect("temporary backup file must be written");

                  let outcome = execute_backup_deletion(BackupDeletionPlan {
                      paths: vec![existing.clone(), missing],
                  });

                  assert_eq!(
                      outcome,
                      BackupDeletionOutcome {
                          deleted_files: 1,
                          failed_files: 1,
                      }
                  );
                  assert!(!existing.exists());
                  fs::remove_dir_all(directory).expect("temporary backup directory must be removed");
              }
          }
          '''
          )
          backup_path.write_text(backup, encoding="utf-8")

          reset_path = Path("apps/desktop/src-tauri/src/commands/data_reset.rs")
          reset = reset_path.read_text(encoding="utf-8")
          reset = reset.replace(
              '''#[derive(Debug, Serialize)]
          #[serde(rename_all = "camelCase")]
          pub struct ResetLocalDataResult {
              deleted: LocalDataSnapshot,
              safety_backup: Option<backup::BackupDescriptor>,
          }
          ''',
              '''#[derive(Debug, Clone, Default, Serialize)]
          #[serde(rename_all = "camelCase")]
          pub struct BackupDeletionResult {
              requested: bool,
              deleted_files: usize,
              failed_files: usize,
          }

          #[derive(Debug, Serialize)]
          #[serde(rename_all = "camelCase")]
          pub struct ResetLocalDataResult {
              deleted: LocalDataSnapshot,
              safety_backup: Option<backup::BackupDescriptor>,
              backup_deletion: BackupDeletionResult,
          }
          '''
          )
          reset = reset.replace(
              '''    let categories = validate_request(&request)?;
              let mut deleted = LocalDataSnapshot::default();
          ''',
              '''    let categories = validate_request(&request)?;
              let backup_deletion_plan = if categories.contains("backups") {
                  Some(backup::plan_delete_all_backups(&app)?)
              } else {
                  None
              };
              let mut deleted = LocalDataSnapshot::default();
          '''
          )
          old_reset_end = '''    if categories.contains("backups") {
                  deleted.backup_files = backup::delete_all_backups(&app)?;
              }

              Ok(ResetLocalDataResult {
                  deleted,
                  safety_backup,
              })
          '''
          new_reset_end = '''    let backup_deletion = match backup_deletion_plan {
                  Some(plan) => {
                      let outcome = backup::execute_backup_deletion(plan);
                      deleted.backup_files = outcome.deleted_files;
                      BackupDeletionResult {
                          requested: true,
                          deleted_files: outcome.deleted_files,
                          failed_files: outcome.failed_files,
                      }
                  }
                  None => BackupDeletionResult::default(),
              };

              Ok(ResetLocalDataResult {
                  deleted,
                  safety_backup,
                  backup_deletion,
              })
          '''
          if old_reset_end not in reset:
              raise SystemExit("data reset end block changed unexpectedly")
          reset = reset.replace(old_reset_end, new_reset_end)
          reset_path.write_text(reset, encoding="utf-8")

          Path("docs/product/CRITICAL_DATA_INTEGRITY_PHASE_1.md").write_text('''# Critical data integrity — Phase 1

          Status: implemented on `fix/critical-data-integrity`

          ## Scope

          This phase prevents a completed local-data removal from being reported as if nothing changed when backup cleanup or UI refresh work fails afterward.

          ## Completed

          - Plans backup deletion before the SQLite transaction starts.
          - Aborts before database changes when the backup directory cannot be prepared.
          - Commits database deletions atomically inside the existing SQLite transaction.
          - Executes backup file deletion after commit as a best-effort cleanup that returns deleted and failed counts instead of turning the committed operation into an error.
          - Adds a structured `backupDeletion` result to the TypeScript, schema, and Rust boundaries.
          - Keeps backward compatibility with desktop payloads that do not yet contain `backupDeletion`.
          - Separates command failure from post-removal refresh failure in the Settings UI.
          - Uses `Promise.allSettled` so one failed refresh cannot rewrite a successful removal as a failed action.
          - Shows a warning when backup cleanup is partial or when on-screen totals could not fully refresh.
          - Keeps the phrase “Nothing was removed” only for command failures that happen before commit.
          - Adds schema, presentation, and native unit coverage for partial cleanup outcomes.

          ## Safety boundary

          - No SQLite schema changes.
          - No backup format changes.
          - No reset category changes.
          - No bundled vocabulary changes.
          - Existing recovery-copy behavior remains intact.
