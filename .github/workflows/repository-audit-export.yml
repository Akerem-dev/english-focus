name: Repository Audit Export

on:
  pull_request:

permissions:
  contents: read

jobs:
  javascript-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full JavaScript release checks
        shell: bash
        run: |
          set +e
          npm run quality:release > audit-quality-release.txt 2>&1
          echo $? > audit-quality-release-exit-code.txt
          set -e

      - name: Capture suspicious markers and inventory
        shell: bash
        run: |
          git ls-files > audit-tracked-files.txt
          grep -RInE --exclude-dir=node_modules --exclude-dir=.git --exclude='package-lock.json' '(TODO|FIXME|HACK|XXX|not implemented|Not implemented|Production implementation pending|coming soon)' apps packages scripts testing docs .github 2>/dev/null > audit-markers.txt || true
          grep -RInE --exclude-dir=node_modules --exclude-dir=.git --exclude='package-lock.json' '(console\.(log|debug|warn|error)|debugger;|panic!\(|unwrap\(|expect\()' apps packages scripts testing 2>/dev/null > audit-risky-patterns.txt || true
          grep -RInE --exclude-dir=node_modules --exclude-dir=.git --exclude='package-lock.json' '(as any|@ts-ignore|@ts-expect-error|eslint-disable|prettier-ignore)' apps packages scripts testing 2>/dev/null > audit-suppressions.txt || true
          git ls-files -z | tar --null -T - -czf repository-source.tgz

      - name: Upload JavaScript audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: repository-javascript-audit
          path: |
            repository-source.tgz
            audit-*.txt
          if-no-files-found: error
          retention-days: 1

  native-audit:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Capture native checks
        shell: powershell
        run: |
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all -- --check *> audit-rust-fmt.txt
          $LASTEXITCODE | Out-File -Encoding ascii audit-rust-fmt-exit-code.txt
          cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --all-features *> audit-rust-test.txt
          $LASTEXITCODE | Out-File -Encoding ascii audit-rust-test-exit-code.txt
          cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings *> audit-rust-clippy.txt
          $LASTEXITCODE | Out-File -Encoding ascii audit-rust-clippy-exit-code.txt
          exit 0

      - name: Upload native audit bundle
        uses: actions/upload-artifact@v4
        with:
          name: repository-native-audit
          path: audit-rust-*.txt
          if-no-files-found: error
          retention-days: 1
