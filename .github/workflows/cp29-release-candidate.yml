name: CP29 Release Candidate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/cp29/**"
      - "package*.json"
      - ".github/workflows/cp29-release-candidate.yml"

jobs:
  windows-regression:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm ci
      - name: CP29 preflight and full regression
        shell: pwsh
        run: ./scripts/cp29/run-full-regression.ps1 -SkipNativeLaunch
