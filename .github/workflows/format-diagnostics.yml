name: Format Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format local data component
        run: npx prettier --write apps/desktop/src/modules/settings/components/LocalDataControlsSection.tsx
      - name: Upload formatted component
        uses: actions/upload-artifact@v4
        with:
          name: interface-polish-formatted-component
          path: apps/desktop/src/modules/settings/components/LocalDataControlsSection.tsx
          if-no-files-found: error
          retention-days: 1
