name: Format Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture formatting differences
        shell: bash
        run: |
          npx prettier --list-different . > format-differences.txt || true
      - name: Upload formatting report
        uses: actions/upload-artifact@v4
        with:
          name: interface-polish-format-report
          path: format-differences.txt
          if-no-files-found: error
          retention-days: 1
