name: Run critical data integrity phase

on:
  pull_request:
    branches: [feat/interface-polish-and-friendly-errors]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/critical-data-integrity'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/critical-data-integrity
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Execute phase script
        shell: bash
        run: |
          set +e
          python <<'EXTRACT' > critical-phase-apply.log 2>&1
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-critical-data-integrity.yml').read_text(encoding='utf-8')
          marker = "          python <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          exec(compile(textwrap.dedent(script), 'critical-data-integrity-phase.py', 'exec'))
          EXTRACT
          echo $? > critical-phase-apply-exit-code.txt
          exit 0

      - name: Upload apply diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: critical-data-integrity-apply-diagnostics
          path: |
            critical-phase-apply.log
            critical-phase-apply-exit-code.txt
          if-no-files-found: error
          retention-days: 1

      - name: Require successful phase script
        shell: bash
        run: test "$(cat critical-phase-apply-exit-code.txt)" = "0"

      - name: Format changed files
        run: |
          npm run format
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --all

      - name: Run repository quality checks
        run: npm run quality

      - name: Run native phase checks
        run: |
          cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml reports_partial_backup_deletion_without_discarding_successes
          cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Commit phase changes and remove temporary workflows
        shell: bash
        run: |
          rm .github/workflows/apply-critical-data-integrity.yml
          rm .github/workflows/run-critical-data-integrity-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve committed data reset outcomes"
          git push origin HEAD:fix/critical-data-integrity
