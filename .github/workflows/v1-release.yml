name: English Focus V1 Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v1.0.0"

permissions:
  contents: read

jobs:
  windows-final-release:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm ci
      - name: Verify V1 metadata
        run: node scripts/cp30/verify-final-release.mjs
      - name: Run final release gate and build installers
        shell: pwsh
        run: ./scripts/cp30/run-final-release.ps1 -BuildInstallers -SkipNativeEnvironment
      - name: Upload Windows V1 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: English-Focus-1.0.0-Windows
          path: release-artifacts/windows/1.0.0/**
          if-no-files-found: error
