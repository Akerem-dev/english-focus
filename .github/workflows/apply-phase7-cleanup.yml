name: Apply phase seven cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Prepare cleanup patch
        shell: bash
        run: |
          set -o pipefail
          cat .phase7/patch.* | base64 -d > phase7.patch.gz
          gzip -t phase7.patch.gz
          gunzip -c phase7.patch.gz > phase7.patch
          git apply --check --verbose phase7.patch

      - name: Apply cleanup patch
        shell: bash
        run: |
          git apply --index --whitespace=nowarn phase7.patch
          git restore --source=HEAD --staged --worktree .github/workflows/quality.yml
          rm -rf .phase7
          rm phase7.patch phase7.patch.gz

      - name: Commit phase seven cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "refactor: finalize simplified vocabulary contracts"
          git push origin HEAD:${{ github.head_ref }}
