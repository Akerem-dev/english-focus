name: Apply phase seven cleanup

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply cleanup patch
        shell: bash
        run: |
          cat .phase7/patch.* | base64 -d | gunzip > /tmp/phase7.patch
          git apply --index --whitespace=nowarn /tmp/phase7.patch
          rm -rf .phase7
          rm .github/workflows/apply-phase7-cleanup.yml

      - name: Commit phase seven cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "refactor: finalize simplified vocabulary contracts"
          git push origin HEAD:${{ github.head_ref }}
