name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check structure
        run: npm run check:structure

      - name: Check forbidden patterns
        run: npm run check:forbidden

      - name: Check CSS tokens
        run: npm run check:css-tokens

      - name: Check dead code
        run: npm run check:dead-code

      - name: Check formatting
        id: formatting
        continue-on-error: true
        shell: bash
        run: npm run format:check > formatting-report.txt 2>&1

      - name: Upload formatting report
        if: steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: formatting-report
          path: formatting-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce formatting result
        if: steps.formatting.outcome == 'failure'
        shell: bash
        run: |
          cat formatting-report.txt
          exit 1

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
