name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check structure
        run: npm run check:structure

      - name: Check forbidden patterns
        run: npm run check:forbidden

      - name: Check CSS tokens
        run: npm run check:css-tokens

      - name: Check dead code
        id: dead_code
        continue-on-error: true
        shell: bash
        run: npm run check:dead-code > dead-code-report.txt 2>&1

      - name: Upload dead-code report
        if: steps.dead_code.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-report
          path: dead-code-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce dead-code result
        if: steps.dead_code.outcome == 'failure'
        shell: bash
        run: |
          cat dead-code-report.txt
          exit 1

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
