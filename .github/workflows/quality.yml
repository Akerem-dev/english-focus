name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check structure
        run: npm run check:structure

      - name: Check forbidden patterns
        run: npm run check:forbidden

      - name: Check CSS tokens
        run: npm run check:css-tokens

      - name: Check dead code
        run: npm run check:dead-code

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Check native contracts
        run: npm run check:native-schemas

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  native-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run native tests
        id: native
        continue-on-error: true
        shell: powershell
        run: |
          cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml *> native-test.log
          "exitCode=$LASTEXITCODE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload native failure log
        if: steps.native.outputs.exitCode != '0'
        uses: actions/upload-artifact@v4
        with:
          name: native-test-failure-log
          path: native-test.log
          if-no-files-found: error
          retention-days: 3

      - name: Confirm native tests
        if: steps.native.outputs.exitCode != '0'
        shell: powershell
        run: exit 1
