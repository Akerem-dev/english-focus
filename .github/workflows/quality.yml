name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format phase four files
        run: >-
          npx prettier --write
          apps/desktop/src/modules/settings/application/index.ts
          apps/desktop/src/modules/settings/application/settingsCategories.ts
          apps/desktop/src/modules/settings/components/index.ts
          apps/desktop/src/modules/settings/components/SettingsCategoryNavigation.tsx
          apps/desktop/src/modules/settings/components/SettingsMaintenanceOverview.tsx
          apps/desktop/src/modules/settings/components/SettingsManagementDetail.tsx
          apps/desktop/src/modules/settings/pages/SettingsPage.tsx
          apps/desktop/src/styles/settings-polish.css
          apps/desktop/tests/components/settings/SettingsPage.test.tsx
          apps/desktop/tests/unit/settings/settings-category-navigation.test.ts
          testing/e2e/settings-navigation.spec.ts

      - name: Upload formatted phase four files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-phase-four-files
          path: |
            apps/desktop/src/modules/settings/application/index.ts
            apps/desktop/src/modules/settings/application/settingsCategories.ts
            apps/desktop/src/modules/settings/components/index.ts
            apps/desktop/src/modules/settings/components/SettingsCategoryNavigation.tsx
            apps/desktop/src/modules/settings/components/SettingsMaintenanceOverview.tsx
            apps/desktop/src/modules/settings/components/SettingsManagementDetail.tsx
            apps/desktop/src/modules/settings/pages/SettingsPage.tsx
            apps/desktop/src/styles/settings-polish.css
            apps/desktop/tests/components/settings/SettingsPage.test.tsx
            apps/desktop/tests/unit/settings/settings-category-navigation.test.ts
            testing/e2e/settings-navigation.spec.ts
          if-no-files-found: error
          retention-days: 1

      - name: Check structure
        run: npm run check:structure

      - name: Check forbidden patterns
        run: npm run check:forbidden

      - name: Check CSS tokens
        run: npm run check:css-tokens

      - name: Check dead code
        run: npm run check:dead-code

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
