name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - name: Check repository structure
        run: npm run check:structure
      - name: Check forbidden patterns
        run: npm run check:forbidden
      - name: Check CSS custom properties
        run: npm run check:css-tokens
      - name: Check dead code
        run: npm run check:dead-code
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
