name: Package Settings Phase 3

on:
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare phase package
        shell: bash
        run: |
          set -euo pipefail
          ROOT="package"
          mkdir -p "$ROOT"
          files=(
            "apps/desktop/src/modules/backup/overlays/BackupRestoreDialog.tsx"
            "apps/desktop/src/modules/settings/components/ActivitySection.tsx"
            "apps/desktop/src/modules/settings/components/SettingsManagementDetail.tsx"
            "apps/desktop/src/styles/index.css"
            "apps/desktop/src/styles/settings-task-flow-polish.css"
            "apps/desktop/src/styles/settings-task-simplification.css"
            "apps/desktop/tests/components/backup/BackupRestoreDialog.test.tsx"
            "apps/desktop/tests/components/settings/ActivitySection.test.tsx"
            "docs/product/USER_FRIENDLY_SETTINGS_PHASE_3.md"
            "testing/e2e/backup-restore.spec.ts"
          )
          for file in "${files[@]}"; do
            mkdir -p "$ROOT/$(dirname "$file")"
            cp "$file" "$ROOT/$file"
          done
          printf '%s\n' "${files[@]}" > "$ROOT/CHANGED_FILES.txt"
          git rev-parse HEAD > "$ROOT/PHASE_3_COMMIT.txt"

      - name: Upload phase package
        uses: actions/upload-artifact@v4
        with:
          name: english-focus-user-friendly-settings-phase-3
          path: package/**
          if-no-files-found: error
          retention-days: 1
