name: Apply Settings Language Phase 1

on:
  push:
    branches: [feat/user-friendly-settings-language]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply-language:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/user-friendly-settings-language

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply user-friendly language
        id: apply_language
        continue-on-error: true
        shell: bash
        run: node scripts/apply-settings-language-phase1.mjs > settings-language-report.txt 2>&1

      - name: Upload language report
        if: steps.apply_language.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: settings-language-phase1-report
          path: settings-language-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Stop after language failure
        if: steps.apply_language.outcome == 'failure'
        shell: bash
        run: |
          cat settings-language-report.txt
          exit 1

      - name: Format changed files
        run: >-
          npx prettier --write
          apps/desktop/src/modules/settings/components/BackupSettingsSection.tsx
          apps/desktop/src/modules/backup/overlays/BackupRestoreDialog.tsx
          apps/desktop/src/modules/settings/components/ActivitySection.tsx
          apps/desktop/src/modules/settings/components/SettingsMaintenanceOverview.tsx
          apps/desktop/src/modules/settings/components/SettingsManagementDetail.tsx
          apps/desktop/src/modules/settings/components/LocalDataControlsSection.tsx
          apps/desktop/src/modules/settings/components/DiagnosticsSection.tsx
          apps/desktop/src/modules/settings/pages/SettingsPage.tsx
          apps/desktop/tests/components/backup/BackupRestoreDialog.test.tsx
          apps/desktop/tests/components/settings/LocalDataControlsSection.test.tsx
          apps/desktop/tests/components/settings/SettingsMaintenanceOverview.test.tsx
          testing/e2e/backup-restore.spec.ts
          testing/e2e/settings-navigation.spec.ts

      - name: Upload formatted language files
        uses: actions/upload-artifact@v4
        with:
          name: settings-language-phase1-files
          path: |
            apps/desktop/src/modules/settings/components/BackupSettingsSection.tsx
            apps/desktop/src/modules/backup/overlays/BackupRestoreDialog.tsx
            apps/desktop/src/modules/settings/components/ActivitySection.tsx
            apps/desktop/src/modules/settings/components/SettingsMaintenanceOverview.tsx
            apps/desktop/src/modules/settings/components/SettingsManagementDetail.tsx
            apps/desktop/src/modules/settings/components/LocalDataControlsSection.tsx
            apps/desktop/src/modules/settings/components/DiagnosticsSection.tsx
            apps/desktop/src/modules/settings/pages/SettingsPage.tsx
            apps/desktop/tests/components/backup/BackupRestoreDialog.test.tsx
            apps/desktop/tests/components/settings/LocalDataControlsSection.test.tsx
            apps/desktop/tests/components/settings/SettingsMaintenanceOverview.test.tsx
            testing/e2e/backup-restore.spec.ts
            testing/e2e/settings-navigation.spec.ts
          if-no-files-found: error
          retention-days: 1
