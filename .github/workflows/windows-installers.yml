name: Windows Installers

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-windows-installers:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Run release quality checks
        id: release_quality
        continue-on-error: true
        shell: powershell
        run: npm run quality:release *> release-quality-report.txt
      - name: Upload release quality report
        if: steps.release_quality.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-quality-report
          path: release-quality-report.txt
          if-no-files-found: error
          retention-days: 1
      - name: Enforce release quality result
        if: steps.release_quality.outcome == 'failure'
        shell: powershell
        run: |
          Get-Content release-quality-report.txt
          exit 1
      - name: Build unsigned MSI and NSIS test installers
        shell: powershell
        run: npm run tauri --workspace=@app/desktop -- build --bundles msi,nsis --ci --no-sign
      - name: Verify and collect installer artifacts
        run: node scripts/check-release-artifacts.mjs --collect
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: english-focus-unsigned-test-installers
          path: release-artifacts/windows/**
          if-no-files-found: error
          retention-days: 14
