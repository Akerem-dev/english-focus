name: Windows Installers

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-installers:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Run standard quality checks
        run: npm run quality
      - name: Check native schemas
        run: npm run check:native-schemas
      - name: Check release metadata
        run: npm run check:release-metadata
      - name: Check reviewed core content
        run: npm run check:core-content
      - name: Run performance tests
        run: npm run test:performance
      - name: Run Windows browser tests
        shell: powershell
        run: |
          npm run test:e2e *>&1 | Tee-Object -FilePath e2e.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-browser-diagnostics
          path: |
            e2e.log
            test-results/**
            playwright-report/**
          if-no-files-found: warn
          retention-days: 3
      - name: Check bundle budget
        run: npm run check:bundle
      - name: Build unsigned MSI and NSIS test installers
        shell: powershell
        run: npm run tauri --workspace=@app/desktop -- build --bundles msi,nsis --ci --no-sign
      - name: Verify and collect installer artifacts
        run: node scripts/check-release-artifacts.mjs --collect
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: english-focus-unsigned-test-installers
          path: release-artifacts/windows/**
          if-no-files-found: error
          retention-days: 14
